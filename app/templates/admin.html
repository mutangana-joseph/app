<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block extra_css %}
    {% endblock %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="{{url_for('static', filename='css/admin.css')}}">
    <link rel="shortcut icon" href="f{{url_for('static', filename='logo/logo.png')}}" type="image/x-icon">
    <title>Admin Panel</title>
</head>



<body>
    <section class="side-bar">
        
        <div class="input-group">
            <input type="search">
            <button type="submit"><i class="fas fa-search"></i></button>
        </div>
        <div class="card-follow">
        <ul>
            
            <li class="card"><a href="{{url_for('admin.dashboard')}}">Dashboard</a></li>
            <li class="card"><a href="{{url_for('admin.displayProduct')}}">Products</a></li>
            <li class="card"><a href="{{url_for('admin.display_category')}}">Categories</a></li>
            <li class="card"><a href="">Users</a></li>
            <li class="card"><a href="">Messages</a></li>
            <li class="card"><a href="">Settings</a></li>
            <li class="card"><a href="">More</a></li>
           
            
        </ul>
    </div>
    </section>
    <section class="wrapper">
        <div class="top-bar">
            <ul>
                <li class="topCard"><a href="{{url_for('admin.admin_home')}}">Admin {{name}}</a></li>
                <li class="topCard">Notification</li>
                <li class="topCard"><a href="{{url_for('admin.signOut')}}">Logout</a></li>
            </ul>
        </div>
        <main class="content">
            
            {% block content %}
            <div class="welcome">
                <h1>Welcome!</h1>
            </div>
            {% endblock %}
        </main>
    </section>

   

    {% block extra_js %}
    {% endblock %}
 
</body>
</html>
